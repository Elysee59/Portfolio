<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ATELIER — Exposition</title>
<meta name="description" content="Exposition photographique · Explorez librement">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Jost:wght@100;200;300&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#FAFAF8;
  --ink:#0A0908;
  --coal:#0E0E0C;
  --dust:#A8A099;
  --rust:#8B6F5E;
  --eout:cubic-bezier(0.22,1,0.36,1);
}

html,body{
  width:100%;height:100%;
  overflow:hidden; /* on gère nous-mêmes la navigation */
  background:var(--bg);
  color:var(--ink);
  font-family:'Jost',sans-serif;font-weight:200;
  cursor:none;
  user-select:none;
  -webkit-user-select:none;
}

/* ══════════════════════════════════════
   TOILE INFINIE
   Conteneur fixe, canvas interne qu'on
   translate librement dans toutes les directions
══════════════════════════════════════ */
#viewport{
  position:fixed;inset:0;
  overflow:hidden;
}

#canvas{
  position:absolute;
  top:0;left:0;
  /* La taille sera définie en JS selon le nb de photos */
  will-change:transform;
  transform-origin:0 0;
  transition:none; /* le smooth est géré manuellement */
}

/* ── Photo card ── */
.card{
  position:absolute;
  cursor:none;
  transition:transform .6s var(--eout), box-shadow .6s var(--eout), opacity .5s;
  opacity:0;
}
.card.visible{opacity:1}
.card:hover{z-index:100!important}

.card-frame{
  background:#fff;
  box-shadow:0 2px 8px rgba(10,9,8,.07),0 8px 28px rgba(10,9,8,.10),0 20px 52px rgba(10,9,8,.07);
  overflow:hidden;
  transition:box-shadow .6s var(--eout),transform .6s var(--eout);
}
.card:hover .card-frame{
  box-shadow:0 6px 18px rgba(10,9,8,.10),0 18px 48px rgba(10,9,8,.16),0 40px 80px rgba(10,9,8,.12);
  transform:scale(1.012) translateY(-4px);
}

.card-img{
  display:block;
  width:100%;height:100%;
  object-fit:cover;
  pointer-events:none;
}

.card-label{
  position:absolute;
  bottom:-28px;left:0;right:0;
  display:flex;justify-content:space-between;
  padding:0 2px;
}
.card-name{
  font-family:'EB Garamond',serif;font-size:11px;font-style:italic;
  color:rgba(10,9,8,.3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:160px;
}
.card-num{font-size:8px;letter-spacing:.26em;text-transform:uppercase;color:var(--dust)}

/* ── Curseur custom ── */
#cd{
  width:5px;height:5px;background:var(--ink);border-radius:50%;
  position:fixed;top:0;left:0;pointer-events:none;z-index:9999;
  transform:translate(-50%,-50%);
  transition:width .15s,height .15s,background .15s;
}
#cr{
  width:32px;height:32px;border:1px solid rgba(10,9,8,.18);border-radius:50%;
  position:fixed;top:0;left:0;pointer-events:none;z-index:9998;
  transform:translate(-50%,-50%);
  transition:width .3s var(--eout),height .3s var(--eout),border-color .3s,transform .3s var(--eout);
}
body.dragging #cd{width:10px;height:10px;background:var(--rust)}
body.dragging #cr{width:52px;height:52px;border-color:rgba(139,111,94,.25);transform:translate(-50%,-50%) rotate(45deg)}
body.hovcard #cd{width:7px;height:7px;background:var(--rust)}
body.hovcard #cr{width:44px;height:44px;border-color:rgba(139,111,94,.3)}

/* ── HUD — navigation hints ── */
#hud{
  position:fixed;bottom:32px;left:50%;transform:translateX(-50%);
  z-index:500;display:flex;align-items:center;gap:20px;
  opacity:0;transition:opacity .5s;pointer-events:none;
}
#hud.show{opacity:1}
.hud-arrow{
  display:flex;flex-direction:column;align-items:center;gap:6px;
  font-size:7px;letter-spacing:.32em;text-transform:uppercase;color:rgba(10,9,8,.2);
}
.hud-arrows{display:grid;grid-template-columns:1fr 1fr 1fr;grid-template-rows:1fr 1fr 1fr;gap:2px;width:36px;height:36px}
.ha{
  display:flex;align-items:center;justify-content:center;
  width:10px;height:10px;
  opacity:.25;
}
.ha svg{width:8px;height:8px;stroke:var(--ink);fill:none;stroke-width:2}
.ha.center{opacity:.12}

/* ── Minimap ── */
#minimap{
  position:fixed;bottom:32px;right:36px;
  width:100px;height:70px;
  background:rgba(250,250,248,.7);
  border:1px solid rgba(10,9,8,.08);
  backdrop-filter:blur(8px);
  z-index:500;overflow:hidden;
  opacity:0;transition:opacity .4s;
}
#minimap.show{opacity:1}
#mm-dots{position:absolute;inset:0}
.mm-dot{
  position:absolute;width:3px;height:3px;border-radius:50%;
  background:var(--rust);opacity:.4;transform:translate(-50%,-50%);
}
#mm-view{
  position:absolute;border:1px solid rgba(139,111,94,.5);
  background:rgba(139,111,94,.08);pointer-events:none;
  transition:left .08s,top .08s,width .08s,height .08s;
}

/* ── Nav header ── */
#nav{
  position:fixed;top:0;left:0;right:0;z-index:600;
  padding:22px 40px;display:flex;align-items:center;justify-content:space-between;
  pointer-events:none;
  background:linear-gradient(to bottom,rgba(250,250,248,.92) 0%,transparent 100%);
}
.n-brand{
  font-family:'Jost',sans-serif;font-size:10px;font-weight:300;
  letter-spacing:.52em;text-transform:uppercase;color:var(--ink);
  pointer-events:all;cursor:none;
  opacity:0;animation:fadeUp .6s 2s var(--eout) forwards;
}
.n-right{
  display:flex;align-items:center;gap:28px;pointer-events:all;
  opacity:0;animation:fadeUp .6s 2.2s var(--eout) forwards;
}
.n-count{font-family:'EB Garamond',serif;font-size:13px;font-style:italic;color:rgba(10,9,8,.3)}
.n-hint{font-size:8px;letter-spacing:.3em;text-transform:uppercase;color:rgba(10,9,8,.2)}
.n-btn{
  font-family:'Jost',sans-serif;font-size:8px;letter-spacing:.3em;text-transform:uppercase;
  background:none;border:1px solid rgba(10,9,8,.12);color:rgba(10,9,8,.4);
  padding:8px 16px;cursor:none;transition:all .3s;
}
.n-btn:hover{border-color:rgba(10,9,8,.4);color:var(--ink)}
@keyframes fadeUp{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:none}}

/* ── Intro ── */
#intro{
  position:fixed;inset:0;background:var(--coal);z-index:8000;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
  transition:opacity 1.4s var(--eout),visibility 1.4s;
}
#intro.gone{opacity:0;visibility:hidden;pointer-events:none}
.i-mark{
  font-family:'DM Serif Display',serif;font-size:clamp(36px,8vw,86px);
  color:#FAFAF8;letter-spacing:.38em;text-transform:uppercase;
  overflow:hidden;line-height:1;
}
.i-mark span{display:inline-block;transform:translateY(110%);animation:liftUp 1s var(--eout) forwards}
.i-mark span:nth-child(1){animation-delay:.00s}.i-mark span:nth-child(2){animation-delay:.06s}
.i-mark span:nth-child(3){animation-delay:.12s}.i-mark span:nth-child(4){animation-delay:.18s}
.i-mark span:nth-child(5){animation-delay:.24s}.i-mark span:nth-child(6){animation-delay:.30s}
.i-mark span:nth-child(7){animation-delay:.36s}
.i-sub{font-size:9px;letter-spacing:.44em;text-transform:uppercase;color:rgba(240,235,227,.18);opacity:0;animation:fin .6s 1.1s forwards}
@keyframes liftUp{to{transform:translateY(0)}}
@keyframes fin{to{opacity:1}}

/* ── Lightbox ── */
#lb{
  position:fixed;inset:0;z-index:7000;background:rgba(8,8,6,0);
  display:flex;align-items:center;justify-content:center;
  pointer-events:none;transition:background .5s;
}
#lb.open{background:rgba(8,8,6,.97);pointer-events:all}
.lb-wrap{
  position:relative;max-width:90vw;max-height:88vh;
  opacity:0;transform:scale(.96);
  transition:opacity .5s var(--eout),transform .5s var(--eout);
}
#lb.open .lb-wrap{opacity:1;transform:scale(1)}
#lb-img{max-width:88vw;max-height:85vh;width:auto;height:auto;display:block;box-shadow:0 60px 120px rgba(0,0,0,.5)}
.lb-meta{position:absolute;bottom:-34px;left:0;right:0;display:flex;justify-content:space-between}
.lb-title{font-family:'EB Garamond',serif;font-style:italic;font-size:13px;color:rgba(250,250,248,.28)}
.lb-ctr{font-size:8px;letter-spacing:.3em;text-transform:uppercase;color:rgba(250,250,248,.18)}
#lb-close{
  position:fixed;top:28px;right:44px;background:none;border:none;cursor:none;
  display:flex;align-items:center;gap:10px;
  font-family:'Jost',sans-serif;font-size:8px;letter-spacing:.3em;text-transform:uppercase;
  color:rgba(250,250,248,.3);transition:color .3s;
}
#lb-close:hover{color:rgba(250,250,248,.8)}
.lb-x{width:16px;height:16px;position:relative;flex-shrink:0}
.lb-x::before,.lb-x::after{content:'';position:absolute;top:50%;left:0;right:0;height:1px;background:currentColor}
.lb-x::before{transform:translateY(-50%) rotate(45deg)}
.lb-x::after{transform:translateY(-50%) rotate(-45deg)}
.lb-nav{
  position:fixed;top:50%;transform:translateY(-50%);
  width:44px;height:44px;background:none;
  border:1px solid rgba(250,250,248,.1);
  display:flex;align-items:center;justify-content:center;
  cursor:none;transition:border-color .3s;
}
.lb-nav:hover{border-color:rgba(250,250,248,.35)}
.lb-nav.lp{left:28px}.lb-nav.ln{right:28px}
.lb-nav svg{width:14px;height:14px;stroke:rgba(250,250,248,.4);fill:none;stroke-width:1.2;transition:stroke .2s}
.lb-nav:hover svg{stroke:rgba(250,250,248,.85)}

/* ── État vide ── */
#empty{
  position:fixed;inset:0;display:none;
  flex-direction:column;align-items:center;justify-content:center;gap:16px;
  text-align:center;z-index:10;
}
#empty.show{display:flex}
.ev-icon{font-family:'DM Serif Display',serif;font-size:52px;font-style:italic;color:var(--dust);opacity:.2}
.ev-title{font-family:'DM Serif Display',serif;font-size:20px;font-style:italic;color:var(--dust)}
.ev-sub{font-size:8px;letter-spacing:.3em;text-transform:uppercase;color:var(--dust);opacity:.4}
</style>
</head>
<body>

<!-- Intro -->
<div id="intro">
  <div class="i-mark"><span>A</span><span>T</span><span>E</span><span>L</span><span>I</span><span>E</span><span>R</span></div>
  <div class="i-sub">Explorez librement</div>
</div>

<!-- Curseur -->
<div id="cd"></div><div id="cr"></div>

<!-- Nav -->
<div id="nav">
  <span class="n-brand">Atelier</span>
  <div class="n-right">
    <span class="n-hint">Glissez pour explorer</span>
    <span class="n-count" id="nav-count"></span>
    <button class="n-btn" id="btn-reset" title="Recentrer">⌂ Recentrer</button>
  </div>
</div>

<!-- Toile infinie -->
<div id="viewport">
  <div id="canvas"></div>
</div>

<!-- HUD directions -->
<div id="hud">
  <div class="hud-arrow">
    <div class="hud-arrows">
      <div class="ha"></div>
      <div class="ha"><svg viewBox="0 0 8 8"><polyline points="1,6 4,2 7,6"/></svg></div>
      <div class="ha"></div>
      <div class="ha"><svg viewBox="0 0 8 8"><polyline points="6,1 2,4 6,7"/></svg></div>
      <div class="ha center"><svg viewBox="0 0 8 8"><circle cx="4" cy="4" r="1.5" fill="currentColor"/></svg></div>
      <div class="ha"><svg viewBox="0 0 8 8"><polyline points="2,1 6,4 2,7"/></svg></div>
      <div class="ha"></div>
      <div class="ha"><svg viewBox="0 0 8 8"><polyline points="1,2 4,6 7,2"/></svg></div>
      <div class="ha"></div>
    </div>
    <span>Glissez dans toutes les directions</span>
  </div>
</div>

<!-- Minimap -->
<div id="minimap"><div id="mm-dots"></div><div id="mm-view"></div></div>

<!-- État vide -->
<div id="empty"><div class="ev-icon">∅</div><div class="ev-title">Exposition en préparation</div><div class="ev-sub">Les œuvres arrivent bientôt</div></div>

<!-- Lightbox -->
<div id="lb">
  <button id="lb-close"><div class="lb-x"></div><span>Fermer</span></button>
  <div class="lb-wrap">
    <img id="lb-img" src="" alt="">
    <div class="lb-meta"><span class="lb-title" id="lb-title"></span><span class="lb-ctr" id="lb-ctr"></span></div>
  </div>
  <button class="lb-nav lp" id="lb-prev"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>
  <button class="lb-nav ln" id="lb-next"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></button>
</div>

<script>
'use strict';

/* ══════════════════════════════════════════
   VARIABLES GLOBALES & ÉTATS
══════════════════════════════════════════ */
let photos = [];
let lbIdx = 0;

// Position de la caméra (Exploration)
let camX = 0, camY = 0;       // Position fluide actuelle
let targetX = 0, targetY = 0; // Position cible (découplage)
let velX = 0, velY = 0;       // Vélocité pour l'inertie
const FRICTION = 0.92;

// États du Drag (Souris & Touch)
let isDragging = false;
let dragStartX = 0, dragStartY = 0;
let dragCamX = 0, dragCamY = 0;
let hasDragged = false;

// Limites du Canvas (calculées dynamiquement)
let minX = 0, maxX = 0, minY = 0, maxY = 0;

// Bounds de la toile (pour les calculs)
let CANVAS_W = 0, CANVAS_H = 0;

/* ══════════════════════════════════════════
   GESTION DU CURSEUR (Coordonnées cibles)
══════════════════════════════════════════ */
let mx = 0, my = 0; // Position réelle de la souris
let rx = 0, ry = 0; // Position amortie du cercle externe
const CD = document.getElementById('cd');
const CR = document.getElementById('cr');

document.addEventListener('mousemove', e => {
  mx = e.clientX;
  my = e.clientY;
});

/* ══════════════════════════════════════════
   BOUCLE PRINCIPALE D'ANIMATION (60/120 FPS)
   Gère le curseur GPU et l'inertie fluide
══════════════════════════════════════════ */
function tick() {
  // 1. Animation du Curseur via Translate3D (Zéro Reflow)
  if (CD && CR) {
    CD.style.transform = `translate3d(${mx}px, ${my}px, 0) translate(-50%, -50%)`;
    rx += (mx - rx) * 0.12;
    ry += (my - ry) * 0.12;
    CR.style.transform = `translate3d(${rx}px, ${ry}px, 0) translate(-50%, -50%)`;
  }

  // 2. Animation de la Toile (Interpolation linéaire / Lerp)
  if (isDragging) {
    // On glisse en douceur vers la cible
    camX += (targetX - camX) * 0.15;
    camY += (targetY - camY) * 0.15;
  } else {
    // Relâchement : application de la vélocité et friction
    camX += velX;
    camY += velY;
    velX *= FRICTION;
    velY *= FRICTION;
    
    // On synchronise la cible pour éviter les sauts au prochain clic
    targetX = camX;
    targetY = camY;
  }

  // Contraintes de bordures et rendu physique
  clampCam();
  applyTransform();

  // Rappel de la boucle à la frame suivante
  requestAnimationFrame(tick);
}
// Lancement immédiat de la boucle unique
requestAnimationFrame(tick);

/* ══════════════════════════════════════════
   FONCTIONS DE RENDU PHYSIQUE
══════════════════════════════════════════ */
function applyTransform() {
  // Utilisation exclusive de translate3d pour forcer le hardware acceleration
  const canvas = document.getElementById('canvas');
  canvas.style.transform = `translate3d(${camX}px, ${camY}px, 0)`;
  updateMinimap();
}

function clampCam() {
  if (camX > minX) { camX = minX; velX = 0; targetX = minX; }
  if (camX < maxX) { camX = maxX; velX = 0; targetX = maxX; }
  if (camY > minY) { camY = minY; velY = 0; targetY = minY; }
  if (camY < maxY) { camY = maxY; velY = 0; targetY = maxY; }
}

/* ══════════════════════════════════════════
   LOGIQUE DE NAVIGATION INTERACTIVE (DRAG)
══════════════════════════════════════════ */
// SOURIS
document.addEventListener('mousedown', e => {
  const navEl = document.getElementById('nav');
  const emptyEl = document.getElementById('empty');
  const LB = document.getElementById('lb');
  if (LB.classList.contains('open')) return;
  if (e.target.closest('nav') || (emptyEl && emptyEl.classList.contains('show'))) return;
  
  isDragging = true;
  hasDragged = false;
  dragStartX = e.clientX;
  dragStartY = e.clientY;
  dragCamX = camX;
  dragCamY = camY;
  velX = 0;
  velY = 0;
  targetX = camX;
  targetY = camY;
  
  document.body.classList.add('dragging');
});

document.addEventListener('mousemove', e => {
  if (!isDragging) return;
  const dx = e.clientX - dragStartX;
  const dy = e.clientY - dragStartY;
  
  if (Math.abs(dx) > 4 || Math.abs(dy) > 4) {
    hasDragged = true;
  }
  
  // On définit la cible, le "tick()" s'occupera d'y aller smoothly
  targetX = dragCamX + dx;
  targetY = dragCamY + dy;
  
  // Calcul instantané de la vélocité pour l'inertie future
  velX = targetX - camX;
  velY = targetY - camY;
});

document.addEventListener('mouseup', () => {
  isDragging = false;
  document.body.classList.remove('dragging');
});

// MOBILE (TOUCH)
document.addEventListener('touchstart', e => {
  const emptyEl = document.getElementById('empty');
  const LB = document.getElementById('lb');
  if (LB.classList.contains('open') || e.target.closest('nav') || (emptyEl && emptyEl.classList.contains('show'))) return;
  isDragging = true;
  hasDragged = false;
  const t = e.touches[0];
  dragStartX = t.clientX;
  dragStartY = t.clientY;
  dragCamX = camX;
  dragCamY = camY;
  velX = 0;
  velY = 0;
  targetX = camX;
  targetY = camY;
}, { passive: true });

document.addEventListener('touchmove', e => {
  if (!isDragging) return;
  const t = e.touches[0];
  const dx = t.clientX - dragStartX;
  const dy = t.clientY - dragStartY;
  
  if (Math.abs(dx) > 4 || Math.abs(dy) > 4) {
    hasDragged = true;
  }
  
  targetX = dragCamX + dx;
  targetY = dragCamY + dy;
  
  velX = targetX - camX;
  velY = targetY - camY;
}, { passive: true });

document.addEventListener('touchend', () => {
  isDragging = false;
});

/* ══════════════════════════════════════════
   BOUTON RECENTRER
══════════════════════════════════════════ */
document.getElementById('btn-reset').addEventListener('click', () => {
  const vw = window.innerWidth, vh = window.innerHeight;
  // Centrer sur la zone centrale de la toile
  camX = (vw - CANVAS_W) / 2;
  camY = (vh - CANVAS_H) / 2;
  velX = 0; velY = 0;
  const c = document.getElementById('canvas');
  c.style.transition = 'transform .8s cubic-bezier(0.22,1,0.36,1)';
  applyTransform();
  setTimeout(() => c.style.transition = 'none', 900);
});

/* ══════════════════════════════════════════
   MINIMAP
══════════════════════════════════════════ */
function updateMinimap() {
  if (!CANVAS_W) return;
  const mm = document.getElementById('minimap');
  const mmW = mm.offsetWidth, mmH = mm.offsetHeight;
  const scaleX = mmW / CANVAS_W, scaleY = mmH / CANVAS_H;
  const vw = window.innerWidth, vh = window.innerHeight;
  // Position du viewport sur la minimap
  const vx = (-camX) * scaleX;
  const vy = (-camY) * scaleY;
  const vw2 = vw * scaleX;
  const vh2 = vh * scaleY;
  const v = document.getElementById('mm-view');
  v.style.left   = Math.max(0, vx) + 'px';
  v.style.top    = Math.max(0, vy) + 'px';
  v.style.width  = Math.min(mmW, vw2) + 'px';
  v.style.height = Math.min(mmH, vh2) + 'px';
}

function buildMinimap() {
  const mm = document.getElementById('minimap');
  const mmW = mm.offsetWidth, mmH = mm.offsetHeight;
  const dots = document.getElementById('mm-dots');
  dots.innerHTML = '';
  photos.forEach(p => {
    const d = document.createElement('div');
    d.className = 'mm-dot';
    const scaleX = mmW / CANVAS_W, scaleY = mmH / CANVAS_H;
    d.style.left = (p._x * scaleX + (p._w / 2) * scaleX) + 'px';
    d.style.top  = (p._y * scaleY + (p._h / 2) * scaleY) + 'px';
    dots.appendChild(d);
  });
}

/* ══════════════════════════════════════════
   PLACEMENT DES PHOTOS SUR LA TOILE
   Priorité 1 : layout sauvegardé par l'admin (WYSIWYG)
   Priorité 2 : layout automatique organique
══════════════════════════════════════════ */
function computeLayout(list) {
  if (!list.length) return;

  const hasLayout = list.every(p => p.layout);

  if (hasLayout) {
    // Utiliser exactement le layout défini dans l'admin
    list.forEach(p => {
      p._x = p.layout.x;
      p._y = p.layout.y;
      p._w = p.layout.w;
      p._h = p.layout.h;
    });
  } else {
    // Fallback : layout automatique organique
    const VW = window.innerWidth, VH = window.innerHeight;
    const COLS = Math.ceil(Math.sqrt(list.length * 1.6));
    const ROWS = Math.ceil(list.length / COLS);
    const CELL_W = Math.round(VW * 0.46), CELL_H = Math.round(VH * 0.68);
    const GAP_X  = Math.round(VW * 0.06), GAP_Y  = Math.round(VH * 0.12);
    const BASE   = { land: Math.round(VW * 0.38), port: Math.round(VW * 0.22), sq: Math.round(VW * 0.28) };
    const rowOffsets = Array.from({ length: ROWS }, (_, i) => {
      const base = (i % 3 === 1) ? CELL_W * 0.5 : (i % 3 === 2) ? CELL_W * 0.25 : 0;
      return base;
    });
    const seed = (x => () => { x = Math.sin(x+1)*43758.5453; return x - Math.floor(x); })(42);
    list.forEach((p, idx) => {
      const col = idx % COLS, row = Math.floor(idx / COLS);
      const bw  = BASE[p.orient] || BASE.sq;
      const scale = 0.78 + seed() * 0.44;
      p._w = Math.round(bw * scale);
      p._h = Math.round(p._w / p.ratio);
      p._x = Math.round(GAP_X + col * (CELL_W + GAP_X) + rowOffsets[row] + (seed() - 0.5) * CELL_W * 0.22);
      p._y = Math.round(GAP_Y + row * (CELL_H + GAP_Y) + (seed() - 0.5) * CELL_H * 0.28);
    });
  }

  // Bounding box
  CANVAS_W = Math.max(...list.map(p => p._x + p._w)) + 200;
  CANVAS_H = Math.max(...list.map(p => p._y + p._h)) + 200;
}

/* ══════════════════════════════════════════
   COULEUR DOMINANTE D'UNE IMAGE
   Échantillonnage Canvas 10×10 → moyenne RGB
   → couleur "ambiant" pour le halo de fond
══════════════════════════════════════════ */
function getDominantColor(img) {
  try {
    const c = document.createElement('canvas');
    c.width = 10; c.height = 10;
    const ctx = c.getContext('2d', { willReadFrequently: true });
    ctx.drawImage(img, 0, 0, 10, 10);
    const d = ctx.getImageData(0, 0, 10, 10).data;
    let r = 0, g = 0, b = 0, count = 0;
    for (let i = 0; i < d.length; i += 4) {
      // Ignorer pixels trop sombres ou trop blancs (fond neutre)
      const lum = (d[i] + d[i+1] + d[i+2]) / 3;
      if (lum < 20 || lum > 235) continue;
      r += d[i]; g += d[i+1]; b += d[i+2]; count++;
    }
    if (!count) return null;
    r = Math.round(r / count);
    g = Math.round(g / count);
    b = Math.round(b / count);
    // Saturation légèrement boostée pour un rendu plus vivant
    const avg = (r + g + b) / 3;
    const boost = 1.4;
    r = Math.min(255, Math.round(avg + (r - avg) * boost));
    g = Math.min(255, Math.round(avg + (g - avg) * boost));
    b = Math.min(255, Math.round(avg + (b - avg) * boost));
    return `${r},${g},${b}`;
  } catch(e) { return null; }
}

/* ══════════════════════════════════════════
   RENDU DES CARTES
   - Photos droites (0° de rotation)
   - Halo ambiant coloré derrière chaque photo
   - Centrage intelligent sans espaces vides
══════════════════════════════════════════ */
function renderCanvas() {
  const canvas = document.getElementById('canvas');
  canvas.innerHTML = '';
  canvas.style.width  = CANVAS_W + 'px';
  canvas.style.height = CANVAS_H + 'px';

  photos.forEach((photo, idx) => {
    // ── Halo ambiant (div derrière la photo) ──
    const halo = document.createElement('div');
    halo.className = 'card-halo';
    halo.style.cssText = `
      position:absolute;
      left:${photo._x - photo._w * 0.18}px;
      top:${photo._y - photo._h * 0.18}px;
      width:${photo._w * 1.36}px;
      height:${photo._h * 1.36}px;
      border-radius:50%;
      background:radial-gradient(ellipse at center, rgba(180,160,140,0.22) 0%, transparent 70%);
      pointer-events:none;
      z-index:0;
      filter:blur(40px);
      transition:opacity 1.2s;
      opacity:0;
    `;
    canvas.appendChild(halo);

    // ── Carte photo ──
    const card = document.createElement('div');
    card.className = 'card';
    card.style.left   = photo._x + 'px';
    card.style.top    = photo._y + 'px';
    card.style.width  = photo._w + 'px';
    card.style.zIndex = 1 + (idx % 5);

    const frame = document.createElement('div');
    frame.className = 'card-frame';
    frame.style.width  = photo._w + 'px';
    frame.style.height = photo._h + 'px';

    const img = document.createElement('img');
    img.className  = 'card-img';
    img.alt        = photo.name;
    img.loading    = 'lazy';
    img.draggable  = false;
    img.crossOrigin = 'anonymous';
    img.style.width  = photo._w + 'px';
    img.style.height = photo._h + 'px';

    // Dès que l'image charge → extraire couleur dominante → peindre le halo
    img.addEventListener('load', () => {
      const color = getDominantColor(img);
      if (color) {
        halo.style.background = `radial-gradient(ellipse at center, rgba(${color},0.28) 0%, rgba(${color},0.08) 50%, transparent 72%)`;
      }
      halo.style.opacity = '1';
    }, { once: true });

    img.src = photo.url;

    const label = document.createElement('div');
    label.className = 'card-label';
    label.innerHTML = `<span class="card-name">${photo.name}</span><span class="card-num">${String(idx+1).padStart(2,'0')}</span>`;

    frame.appendChild(img);
    card.appendChild(frame);
    card.appendChild(label);

    card.addEventListener('mouseenter', () => document.body.classList.add('hovcard'));
    card.addEventListener('mouseleave', () => document.body.classList.remove('hovcard'));
    card.addEventListener('click', () => { if (!hasDragged) openLb(idx); });

    setTimeout(() => card.classList.add('visible'), 80 + idx * 50);
    canvas.appendChild(card);
  });

  // ── Centrage : démarrer sur les premières photos, pas dans le vide ──
  const vw = window.innerWidth, vh = window.innerHeight;
  const placed = photos.filter(p => p._x !== undefined);
  if (placed.length) {
    // Centre de masse des photos → on centre la vue dessus
    const minX = Math.min(...placed.map(p => p._x));
    const minY = Math.min(...placed.map(p => p._y));
    // On commence en haut-gauche des photos avec une petite marge
    camX = -minX + Math.round(vw * 0.08);
    camY = -minY + Math.round(vh * 0.10);
  } else {
    camX = 80; camY = 80;
  }
  clampCam();
  applyTransform();
  buildMinimap();

  setTimeout(() => {
    document.getElementById('hud').classList.add('show');
    document.getElementById('minimap').classList.add('show');
    setTimeout(() => document.getElementById('hud').classList.remove('show'), 4000);
  }, 2500);
}

/* ══════════════════════════════════════════
   LIGHTBOX
══════════════════════════════════════════ */
const LB = document.getElementById('lb');
const LB_IMG = document.getElementById('lb-img');
const LB_TITLE = document.getElementById('lb-title');
const LB_CTR = document.getElementById('lb-ctr');

function openLb(i) {
  lbIdx = i;
  const p = photos[i];
  LB_IMG.src = p.url;
  LB_TITLE.textContent = p.name;
  LB_CTR.textContent = `${i+1} / ${photos.length}`;
  LB.classList.add('open');
}
function closeLb() {
  LB.classList.remove('open');
  setTimeout(() => { LB_IMG.src = ''; }, 500);
}
function navLb(d) {
  lbIdx = (lbIdx + d + photos.length) % photos.length;
  LB_IMG.style.cssText = 'opacity:0;transform:scale(.96)';
  setTimeout(() => {
    const p = photos[lbIdx];
    LB_IMG.src = p.url;
    LB_TITLE.textContent = p.name;
    LB_CTR.textContent = `${lbIdx+1} / ${photos.length}`;
    LB_IMG.style.cssText = 'opacity:1;transform:scale(1)';
  }, 180);
}
LB_IMG.style.transition = 'opacity .2s,transform .2s';
document.getElementById('lb-close').addEventListener('click', closeLb);
document.getElementById('lb-prev').addEventListener('click', () => navLb(-1));
document.getElementById('lb-next').addEventListener('click', () => navLb(1));
LB.addEventListener('click', e => { if (e.target === LB) closeLb(); });
document.addEventListener('keydown', e => {
  if (!LB.classList.contains('open')) return;
  if (e.key === 'Escape') closeLb();
  if (e.key === 'ArrowLeft') navLb(-1);
  if (e.key === 'ArrowRight') navLb(1);
});

// Flèches clavier pour naviguer dans la toile
document.addEventListener('keydown', e => {
  const LB = document.getElementById('lb');
  if (LB.classList.contains('open')) return;
  const STEP = 250;
  if (e.key === 'ArrowLeft')  { targetX += STEP; }
  if (e.key === 'ArrowRight') { targetX -= STEP; }
  if (e.key === 'ArrowUp')    { targetY += STEP; }
  if (e.key === 'ArrowDown')  { targetY -= STEP; }
});

/* ══════════════════════════════════════════
   RESIZE
══════════════════════════════════════════ */
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    if (photos.length) {
      computeLayout(photos);
      renderCanvas();
    }
  }, 300);
});

/* ══════════════════════════════════════════
   INIT
══════════════════════════════════════════ */
async function init() {
  try {
    const r = await fetch('/api/photos');
    if (r.ok) photos = (await r.json()).sort((a, b) => a.order - b.order);
  } catch(e) { photos = []; }

  document.getElementById('nav-count').textContent =
    photos.length ? photos.length + ' œuvres' : '';

  if (!photos.length) {
    document.getElementById('empty').classList.add('show');
    setTimeout(() => document.getElementById('intro').classList.add('gone'), 600);
    return;
  }

  computeLayout(photos);
  renderCanvas();
  setTimeout(() => document.getElementById('intro').classList.add('gone'), 2200);
}

init();
</script>
